# ─────────────────────────────────────────────────────────────────────────────
# ML Agentic Stock Prediction — Default Configuration
# All pipeline parameters live here. Edit this file instead of the notebook.
# ─────────────────────────────────────────────────────────────────────────────

data:
  ticker: "AAPL"
  start_date: "2015-01-01"
  # end_date is set dynamically to today at runtime
  indian_tickers:
    - "RELIANCE.NS"
    - "TCS.NS"
    - "INFY.NS"
    - "HDFCBANK.NS"
    - "WIPRO.NS"
  market_context_tickers:
    - "SPY"
    - "QQQ"
    - "XLK"
    - "^VIX"

model:
  test_size: 0.20          # 20% held out as test set
  look_back: 60            # LSTM sequence length in trading days
  forecast_days: 1         # predict 1 day ahead
  random_state: 42
  n_folds: 5               # Optuna cross-validation folds

  # Walk-forward validation windows
  wf_train_months: 24      # rolling training window
  wf_test_months: 3        # rolling test step

  # Ensemble weights (overwritten by data-driven Step 5b at runtime)
  ensemble_weights:
    xgb: 0.4
    lgb: 0.4
    rf:  0.2

  # Multi-step forecast horizons (trading days)
  multistep_horizons: [1, 3, 5, 10]

backtest:
  initial_capital: 10000.0
  transaction_cost: 0.001  # 0.1% per trade
  stop_loss: 0.05          # 5% stop-loss
  take_profit: 0.10        # 10% take-profit

live_inference:
  history_days: 600        # days downloaded for SMA_200 to be non-NaN on last row
  cache_ttl_seconds: 300   # 5-minute TTL for predict_tomorrow cache

api:
  # All free — add keys to Colab Secrets or environment variables
  # GROQ_API_KEY      : console.groq.com
  # FINNHUB_API_KEY   : finnhub.io
  # ALPHAVANTAGE_KEY  : alphavantage.co
  # FRED_API_KEY      : fred.stlouisfed.org
  groq_model: "llama-3.3-70b-versatile"
  av_news_limit: 50
  finnhub_news_limit: 30
  google_news_limit: 25
